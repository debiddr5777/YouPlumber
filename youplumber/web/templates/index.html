<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="YouPlumber — Mass YouTube audio acquisition for DJs. Fast, parallel, beautiful.">
<title>YouPlumber</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-headphones"></i></div>
      <div>
        <div class="logo-text">YouPlumber</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
          <span id="live-dot" class="stat-dot"></span>
          <span id="live-label" style="font-size:11px;color:var(--text-tertiary)">Idle</span>
        </div>
      </div>
      <span class="logo-badge">v0.1</span>
    </div>
    <div class="header-stats">
      <div class="stat-pill"><i class="fas fa-layer-group" style="color:var(--orange)"></i> <span id="head-queued">0</span></div>
      <div class="stat-pill"><i class="fas fa-arrow-down" style="color:var(--accent)"></i> <span id="head-active">0</span></div>
      <div class="stat-pill"><i class="fas fa-circle-check" style="color:var(--green)"></i> <span id="head-done">0</span></div>
      <div class="stat-pill"><i class="fas fa-hard-drive"></i> <span id="head-disk">0 MB</span></div>
      <button class="settings-btn" onclick="showSettings()" title="Settings"><i class="fas fa-gear"></i></button>
    </div>
  </header>

  <!-- Search Section -->
  <section class="search-section">
    <div class="search-tabs">
      <button class="search-tab active" data-mode="url" onclick="setSearchMode('url')"><i class="fas fa-link" style="margin-right:5px"></i>URL</button>
      <button class="search-tab" data-mode="search" onclick="setSearchMode('search')"><i class="fas fa-magnifying-glass" style="margin-right:5px"></i>Search</button>
    </div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <i class="fas fa-link"></i>
        <input id="main-input" class="search-input" placeholder="Paste a YouTube URL (channel, playlist, or video)" autofocus onkeydown="if(event.key==='Enter')mainAction()">
      </div>
      <button id="btn-action" class="btn btn-primary" onclick="mainAction()"><i class="fas fa-bolt"></i> Go</button>
    </div>
  </section>

  <!-- Results Panel -->
  <section id="results-panel" class="results-panel card" style="display:none;margin-bottom:24px">
    <div class="card-header">
      <div class="card-title">
        <i class="fas fa-list-music" style="color:var(--purple)"></i>
        <span id="result-label">Results</span>
        <span id="result-count" class="card-badge">0</span>
      </div>
      <button class="btn btn-icon btn-sm" onclick="closeResults()" title="Close"><i class="fas fa-xmark"></i></button>
    </div>
    <div id="results-list" class="card-body flush" style="max-height:40vh;overflow-y:auto"></div>
    <div id="result-actions" class="result-actions">
      <div class="select-info">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="sel-all" class="result-checkbox" onchange="toggleAll()"> Select all
        </label>
        <span id="sel-count" style="color:var(--text-tertiary)">0 selected</span>
      </div>
      <button id="btn-add-q" class="btn btn-success btn-sm" data-search="0" onclick="addToQueue()"><i class="fas fa-plus"></i> Add to Queue</button>
    </div>
  </section>

  <!-- Main Grid -->
  <div class="main-grid">

    <!-- Queue Panel -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><i class="fas fa-bars-staggered"></i> Queue <span id="queue-badge" class="card-badge">0</span></div>
        <div style="display:flex;gap:8px">
          <button id="btn-go" class="btn btn-primary btn-sm" onclick="startQ()"><i class="fas fa-play"></i> Start</button>
          <button id="btn-halt" class="btn btn-danger btn-sm" style="display:none" onclick="stopQ()"><i class="fas fa-stop"></i> Stop</button>
          <button class="btn btn-icon btn-sm" onclick="clearQ()" title="Clear queue"><i class="fas fa-trash-can"></i></button>
        </div>
      </div>
      <div id="active-box" class="card-body flush"></div>
      <div id="q-list" class="card-body flush" style="max-height:30vh;overflow-y:auto"></div>
      <div id="q-empty" class="empty-state">
        <i class="fas fa-inbox"></i>
        <p>Queue is empty.<br>Paste a URL or search above.</p>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div>
      <!-- Recent Downloads -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header">
          <div class="card-title"><i class="fas fa-clock-rotate-left" style="color:var(--green)"></i> Recent <span id="recent-badge" class="card-badge">0</span></div>
        </div>
        <div id="recent-list" class="card-body flush" style="max-height:50vh;overflow-y:auto"></div>
        <div id="recent-empty" class="empty-state" style="display:none">
          <i class="fas fa-circle-check"></i>
          <p>No downloads yet</p>
        </div>
      </div>

      <!-- Sessions -->
      <div class="card">
        <div class="sess-toggle" onclick="toggleSessions()">
          <div class="card-title" style="padding:0"><i class="fas fa-clock" style="color:var(--text-tertiary)"></i> Sessions <span id="sess-badge" class="card-badge">0</span></div>
          <i id="sess-arrow" class="fas fa-chevron-down" style="font-size:11px;color:var(--text-tertiary)"></i>
        </div>
        <div id="sess-list" class="card-body flush" style="display:none"></div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="app-footer">
    <span>Output → <span id="out-dir" style="font-family:monospace"></span></span>
  </footer>

</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay" onclick="if(event.target===this)hideSettings()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3><i class="fas fa-gear" style="color:var(--accent);margin-right:8px"></i>Settings</h3>
    <label>Output folder</label>
    <input id="set-out" style="font-family:monospace;font-size:12px">
    <div class="field-row">
      <div><label>Codec</label>
        <select id="set-codec"><option value="mp3">MP3</option><option value="wav">WAV</option><option value="flac">FLAC</option><option value="aac">AAC</option><option value="opus">Opus</option></select></div>
      <div><label>Bitrate</label>
        <select id="set-bitrate"><option value="128">128</option><option value="192">192</option><option value="256">256</option><option value="320">320</option></select></div>
      <div><label>Workers</label>
        <input id="set-jobs" type="number" min="1" max="16"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="hideSettings()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveSettings()"><i class="fas fa-check"></i> Save</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
